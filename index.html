<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Data Rahasia</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f0f0;
            font-family: 'Arial', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container untuk tombol awal */
        #start-container {
            text-align: center;
            z-index: 100;
        }

        /* Tombol Pancingan */
        #start-btn {
            padding: 20px 40px;
            font-size: 28px;
            font-weight: bold;
            background-color: #d32f2f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 6px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s, background-color 0.2s;
        }

        #start-btn:hover {
            background-color: #b71c1c;
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        /* Container untuk prank yang tersembunyi awalnya */
        #prank-container {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        /* Teks Prank */
        .prank-text {
            position: absolute;
            white-space: nowrap;
            font-weight: 900;
            font-size: 40px;
            text-transform: uppercase;
            color: lime; /* Warna awal */
            text-shadow: 2px 2px 0px #000;
            pointer-events: none;
        }

        /* Animasi tambahan biar rame */
        @keyframes wobble {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(10deg); }
            100% { transform: rotate(0deg); }
        }

        .anim-wobble {
            animation: wobble 0.5s infinite;
        }
    </style>
</head>
<body>

    <!-- Tampilan Awal -->
    <div id="start-container">
        <h2>⚠️ KLIK UNTUK MEMBUKA ⚠️</h2>
        <button id="start-btn" onclick="startPrank()">DATA PENTING MAIRAH MALAYSIA</button>
    </div>

    <!-- Tampilan Prank (Tersembunyi) -->
    <div id="prank-container">
        <!-- Teks akan di-generate di sini lewat JavaScript -->
    </div>

    <script>
        const startContainer = document.getElementById('start-container');
        const prankContainer = document.getElementById('prank-container');
        const colors = ['#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF00FF', '#00FFFF', '#FFFFFF', '#FF8800'];
        const texts = [];
        const totalTexts = 50; // Jumlah tulisan "PRANK!"
        let isPrankActive = false;

        // Fungsi untuk memulai prank saat tombol diklik
        function startPrank() {
            startContainer.style.display = 'none'; // Sembunyikan tombol
            prankContainer.style.display = 'block'; // Tampilkan layar hitam
            document.body.style.backgroundColor = '#000'; // Ubah background body
            
            isPrankActive = true;

            // Buat tulisan-tulisan PRANK!
            for (let i = 0; i < totalTexts; i++) {
                createPrankText();
            }

            // Mulai animasi pergerakan
            animateTexts();
        }

        function createPrankText() {
            const el = document.createElement('div');
            el.className = 'prank-text anim-wobble';
            el.innerText = 'PRANK!';
            
            // Ukuran acak
            const size = Math.floor(Math.random() * 50) + 20; // 20px sampai 70px
            el.style.fontSize = size + 'px';
            
            // Warna acak
            el.style.color = colors[Math.floor(Math.random() * colors.length)];

            prankContainer.appendChild(el);

            // Tentukan posisi awal acak
            const posX = Math.random() * (window.innerWidth - el.offsetWidth);
            const posY = Math.random() * (window.innerHeight - el.offsetHeight);
            
            // Tentukan kecepatan dan arah acak
            const speed = (Math.random() * 6) + 3; // Kecepatan 3 sampai 9
            const dx = (Math.random() < 0.5 ? 1 : -1) * speed;
            const dy = (Math.random() < 0.5 ? 1 : -1) * speed;

            texts.push({
                element: el,
                x: posX,
                y: posY,
                dx: dx,
                dy: dy
            });
        }

        function animateTexts() {
            if (!isPrankActive) return;

            for (let i = 0; i < texts.length; i++) {
                let t = texts[i];
                let el = t.element;

                // Update posisi berdasarkan kecepatan
                t.x += t.dx;
                t.y += t.dy;

                // Cek pantulan di sumbu X (kiri/kanan)
                if (t.x <= 0) {
                    t.x = 0;
                    t.dx *= -1;
                    el.style.color = colors[Math.floor(Math.random() * colors.length)]; // Ganti warna saat mantul
                } else if (t.x + el.offsetWidth >= window.innerWidth) {
                    t.x = window.innerWidth - el.offsetWidth;
                    t.dx *= -1;
                    el.style.color = colors[Math.floor(Math.random() * colors.length)];
                }

                // Cek pantulan di sumbu Y (atas/bawah)
                if (t.y <= 0) {
                    t.y = 0;
                    t.dy *= -1;
                } else if (t.y + el.offsetHeight >= window.innerHeight) {
                    t.y = window.innerHeight - el.offsetHeight;
                    t.dy *= -1;
                }

                // Terapkan posisi baru ke elemen HTML
                el.style.left = t.x + 'px';
                el.style.top = t.y + 'px';
            }

            // Loop animasi
            requestAnimationFrame(animateTexts);
        }

        // Tambah teks kalau layar diklik (opsional, biar makin penuh)
        document.body.addEventListener('click', () => {
            if(isPrankActive) {
                // Tambah 3 teks setiap kali diklik
                for(let i=0; i<3; i++){
                    createPrankText();
                }
            }
        });

        // Tangani jika jendela di-resize agar teks tidak keluar batas
        window.addEventListener('resize', () => {
            if(!isPrankActive) return;
            texts.forEach(t => {
                if (t.x + t.element.offsetWidth > window.innerWidth) {
                    t.x = window.innerWidth - t.element.offsetWidth;
                }
                if (t.y + t.element.offsetHeight > window.innerHeight) {
                    t.y = window.innerHeight - t.element.offsetHeight;
                }
            });
        });

    </script>
</body>
</html>
